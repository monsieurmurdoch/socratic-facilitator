services:
  postgres:
    image: postgres:15
    container_name: socratic-facilitator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: socratic_facilitator_test
    ports:
      - "5432:5432"
    volumes:
      - socratic_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d socratic_facilitator_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  socratic_postgres_data:

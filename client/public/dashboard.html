<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Socratic Facilitator - Teacher Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            padding: 2rem;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.25rem;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 0.5rem;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .progress-bar {
            width: 100%;
            background: #333;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 0.25rem;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-color);
            transition: width 0.3s;
        }
    </style>
</head>

<body>
    <div style="max-width: 1200px; margin: 0 auto;">
        <h1>Teacher Dashboard</h1>

        <div id="join-section">
            <input type="text" id="session-code" placeholder="Enter Session Code (e.g. ab12cd34)">
            <button id="join-btn" class="primary-btn">Monitor Session</button>
        </div>

        <div id="dashboard-content" style="display: none;">
            <h2 id="session-title">Session: ABCD123</h2>

            <div class="dashboard-container">
                <div class="card">
                    <h2>Participant Talk Time</h2>
                    <div id="participants-list"></div>
                </div>

                <div class="card">
                    <h2>AI Facilitator Stats</h2>
                    <div class="stat-row">
                        <span>Talk Ratio:</span>
                        <span id="ai-ratio">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div id="ai-ratio-bar" class="progress-fill" style="width: 0%; background: #e74c3c;"></div>
                    </div>

                    <div class="stat-row" style="margin-top: 1rem;">
                        <span>Total AI Interventions:</span>
                        <span id="ai-count">0</span>
                    </div>
                    <div class="stat-row">
                        <span>Last Move:</span>
                        <span id="ai-last-move">None</span>
                    </div>
                </div>

                <div class="card">
                    <h2>Tension Metrics</h2>
                    <div class="stat-row">
                        <span>Overall Tension Level:</span>
                        <span id="tension-level">0</span>
                    </div>
                    <p style="font-size: 0.9rem; color: #aaa;">Tracks disagreement, confusion, or debate intensity.</p>
                </div>

                <div class="card">
                    <h2>Recent Messages Flagged</h2>
                    <ul id="flagged-list" style="padding-left: 1.5rem; color: #ccc;">
                        <!-- Flagged insights -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="/src/dashboard.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Socratic Facilitator — Admin</title>
  <link rel="stylesheet" href="/src/style.css?v=19">
  <style>
    /* Admin-specific styles */
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 32px;
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      flex-shrink: 0;
    }

    .admin-header h1 {
      font-family: 'Source Serif 4', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
      margin: 0;
    }

    .admin-header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .admin-user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .admin-user-name {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
    }

    .admin-user-role {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 4px 10px;
      border-radius: 12px;
      background: var(--surface-alt);
      color: var(--text-secondary);
    }

    .btn-back {
      padding: 8px 16px;
      background: none;
      color: var(--text-secondary);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-back:hover {
      background: var(--surface-alt);
      color: var(--text);
    }

    .btn-logout {
      padding: 8px 16px;
      background: none;
      color: var(--text-secondary);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      background: var(--surface-alt);
      color: var(--text);
    }

    .admin-tabs {
      display: flex;
      gap: 4px;
      padding: 0 32px;
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      flex-shrink: 0;
    }

    .admin-tab {
      padding: 14px 24px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: -1.5px;
    }

    .admin-tab:hover {
      color: var(--text);
      background: var(--surface-alt);
    }

    .admin-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .admin-content {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      background: var(--bg);
    }

    .admin-section {
      display: none;
    }

    .admin-section.active {
      display: block;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .section-header h2 {
      font-family: 'Source Serif 4', serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--text);
      margin: 0;
    }

    .section-actions {
      display: flex;
      gap: 12px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 4px 12px var(--shadow);
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

    .data-table-container {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 4px 12px var(--shadow);
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table th,
    .data-table td {
      padding: 14px 20px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .data-table th {
      background: var(--surface-alt);
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    .data-table tr:hover {
      background: var(--surface-alt);
    }

    .data-table tr:last-child td {
      border-bottom: none;
    }

    .role-select {
      padding: 6px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .role-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .role-select.Admin {
      background: #e8f4f8;
      color: #0891b2;
    }

    .role-select.SuperAdmin {
      background: #fef3c7;
      color: #d97706;
    }

    .role-select.Teacher {
      background: #f0fdf4;
      color: #16a34a;
    }

    .role-select.Student {
      background: var(--surface-alt);
      color: var(--text-secondary);
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge.Admin {
      background: #e8f4f8;
      color: #0891b2;
    }

    .badge.SuperAdmin {
      background: #fef3c7;
      color: #d97706;
    }

    .badge.Teacher {
      background: #f0fdf4;
      color: #16a34a;
    }

    .badge.Student {
      background: var(--surface-alt);
      color: var(--text-secondary);
    }

    .badge.completed {
      background: #f0fdf4;
      color: #16a34a;
    }

    .badge.running {
      background: #fef3c7;
      color: #d97706;
    }

    .badge.failed {
      background: #fee;
      color: #c33;
    }

    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .error-state {
      background: #fee;
      border: 1px solid #fcc;
      border-radius: var(--radius);
      padding: 16px 20px;
      color: #c33;
      margin-bottom: 24px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .subsection-title {
      font-family: 'Source Serif 4', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text);
      margin: 32px 0 16px 0;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--accent-light);
    }

    .metric-score {
      font-weight: 600;
      color: var(--accent);
    }

    .timestamp {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .action-cell {
      display: flex;
      gap: 8px;
    }

    .btn-action {
      padding: 6px 12px;
      background: var(--surface-alt);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-action:hover {
      background: var(--border);
    }

    .btn-action.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .btn-action.primary:hover {
      background: #7A5234;
    }

    .btn-action:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .admin-header {
        flex-direction: column;
        gap: 16px;
        padding: 16px 20px;
      }

      .admin-header-right {
        width: 100%;
        justify-content: space-between;
      }

      .admin-tabs {
        padding: 0 20px;
        overflow-x: auto;
      }

      .admin-tab {
        padding: 12px 16px;
        font-size: 0.85rem;
      }

      .admin-content {
        padding: 20px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .section-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .data-table-container {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <header class="admin-header">
    <h1>Socratic Facilitator — Admin</h1>
    <div class="admin-header-right">
      <div class="admin-user-info">
        <span class="admin-user-name" id="user-name">Loading...</span>
        <span class="admin-user-role" id="user-role">Loading...</span>
      </div>
      <a href="/" class="btn-back">Back to Facilitator</a>
      <button class="btn-logout" id="logout-btn">Log Out</button>
    </div>
  </header>

  <nav class="admin-tabs">
    <button class="admin-tab active" data-tab="overview">Overview</button>
    <button class="admin-tab" data-tab="users">Users</button>
    <button class="admin-tab" data-tab="evals">Evals</button>
    <button class="admin-tab" data-tab="maintenance">Maintenance</button>
  </nav>

  <main class="admin-content">
    <!-- Overview Tab -->
    <section class="admin-section active" id="overview-section">
      <div class="section-header">
        <h2>Overview</h2>
      </div>
      <div id="overview-content">
        <div class="loading-state">Loading overview...</div>
      </div>
    </section>

    <!-- Users Tab -->
    <section class="admin-section" id="users-section">
      <div class="section-header">
        <h2>Users</h2>
      </div>
      <div id="users-content">
        <div class="loading-state">Loading users...</div>
      </div>
    </section>

    <!-- Evals Tab -->
    <section class="admin-section" id="evals-section">
      <div class="section-header">
        <h2>Model Evaluations</h2>
        <div class="section-actions">
          <button class="btn-action primary" id="run-eval-btn">Run New Eval</button>
        </div>
      </div>
      <div id="evals-content">
        <div class="loading-state">Loading evaluations...</div>
      </div>
    </section>

    <!-- Maintenance Tab -->
    <section class="admin-section" id="maintenance-section">
      <div class="section-header">
        <h2>Maintenance</h2>
        <div class="section-actions">
          <button class="btn-action primary" id="run-retention-btn">Run Retention Purge</button>
        </div>
      </div>
      <div id="maintenance-content">
        <div class="loading-state">Loading maintenance history...</div>
      </div>
    </section>
  </main>

  <script>
    // Auth state
    let authToken = null;
    let currentUser = null;

    // Initialize page
    document.addEventListener('DOMContentLoaded', async () => {
      // Check auth
      authToken = localStorage.getItem('socratic_auth_token');
      const userJson = localStorage.getItem('socratic_auth_user');

      if (!authToken || !userJson) {
        window.location.href = '/';
        return;
      }

      try {
        currentUser = JSON.parse(userJson);

        // Check role
        if (currentUser.role !== 'Admin' && currentUser.role !== 'SuperAdmin') {
          window.location.href = '/';
          return;
        }

        // Update header
        document.getElementById('user-name').textContent = currentUser.name || 'User';
        document.getElementById('user-role').textContent = currentUser.role || 'Unknown';

        // Setup tabs
        setupTabs();

        // Load initial data
        await loadOverview();
      } catch (error) {
        console.error('Failed to initialize admin page:', error);
        window.location.href = '/';
      }
    });

    // Tab switching
    function setupTabs() {
      const tabs = document.querySelectorAll('.admin-tab');
      const sections = document.querySelectorAll('.admin-section');

      tabs.forEach(tab => {
        tab.addEventListener('click', async () => {
          const tabName = tab.dataset.tab;

          // Update active tab
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');

          // Update active section
          sections.forEach(s => s.classList.remove('active'));
          document.getElementById(`${tabName}-section`).classList.add('active');

          // Load data for tab
          switch (tabName) {
            case 'overview':
              await loadOverview();
              break;
            case 'users':
              await loadUsers();
              break;
            case 'evals':
              await loadEvals();
              break;
            case 'maintenance':
              await loadMaintenance();
              break;
          }
        });
      });
    }

    // API helper
    async function apiCall(url, options = {}) {
      const response = await fetch(url, {
        ...options,
        headers: {
          'Authorization': `Bearer ${authToken}`,
          'Content-Type': 'application/json',
          ...options.headers
        }
      });

      if (!response.ok) {
        throw new Error(`API error: ${response.status} ${response.statusText}`);
      }

      return response.json();
    }

    // Load overview
    async function loadOverview() {
      const container = document.getElementById('overview-content');

      try {
        const data = await apiCall('/api/admin/overview');

        container.innerHTML = `
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-value">${data.totalUsers || 0}</div>
              <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${data.totalSessions || 0}</div>
              <div class="stat-label">Total Sessions</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${data.totalMessages || 0}</div>
              <div class="stat-label">Total Messages</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${data.activeSessions || 0}</div>
              <div class="stat-label">Active Sessions</div>
            </div>
          </div>

          <h3 class="subsection-title">Recent Audit Logs</h3>
          <div class="data-table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Time</th>
                  <th>Action</th>
                  <th>Actor</th>
                  <th>Target</th>
                  <th>Details</th>
                </tr>
              </thead>
              <tbody>
                ${data.auditLogs && data.auditLogs.length > 0 ? data.auditLogs.map(log => `
                  <tr>
                    <td><span class="timestamp">${formatTimestamp(log.createdAt)}</span></td>
                    <td>${formatAction(log.action)}</td>
                    <td>${log.actorName || 'Unknown'}</td>
                    <td>${log.targetName || log.targetEmail || 'N/A'}</td>
                    <td>${formatMetadata(log.metadata)}</td>
                  </tr>
                `).join('') : '<tr><td colspan="5" class="empty-state">No audit logs yet</td></tr>'}
              </tbody>
            </table>
          </div>
        `;
      } catch (error) {
        container.innerHTML = `<div class="error-state">Failed to load overview: ${error.message}</div>`;
      }
    }

    // Load users
    async function loadUsers() {
      const container = document.getElementById('users-content');

      try {
        const data = await apiCall('/api/admin/users');

        container.innerHTML = `
          <div class="data-table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Created</th>
                </tr>
              </thead>
              <tbody>
                ${data && data.length > 0 ? data.map(user => `
                  <tr>
                    <td>${user.name || 'Unknown'}</td>
                    <td>${user.email || 'N/A'}</td>
                    <td>
                      <select class="role-select ${user.role}" data-user-id="${user.id}" ${currentUser.role !== 'SuperAdmin' && user.role === 'SuperAdmin' ? 'disabled' : ''}>
                        <option value="Student" ${user.role === 'Student' ? 'selected' : ''}>Student</option>
                        <option value="Teacher" ${user.role === 'Teacher' ? 'selected' : ''}>Teacher</option>
                        <option value="Admin" ${user.role === 'Admin' ? 'selected' : ''}>Admin</option>
                        <option value="SuperAdmin" ${user.role === 'SuperAdmin' ? 'selected' : ''}>SuperAdmin</option>
                      </select>
                    </td>
                    <td><span class="timestamp">${formatTimestamp(user.createdAt)}</span></td>
                  </tr>
                `).join('') : '<tr><td colspan="4" class="empty-state">No users found</td></tr>'}
              </tbody>
            </table>
          </div>
        `;

        // Setup role change handlers
        container.querySelectorAll('.role-select').forEach(select => {
          select.addEventListener('change', async (e) => {
            const userId = e.target.dataset.userId;
            const newRole = e.target.value;
            await updateUserRole(userId, newRole);
          });
        });
      } catch (error) {
        container.innerHTML = `<div class="error-state">Failed to load users: ${error.message}</div>`;
      }
    }

    // Update user role
    async function updateUserRole(userId, newRole) {
      try {
        await apiCall(`/api/admin/users/${userId}/role`, {
          method: 'PATCH',
          body: JSON.stringify({ role: newRole })
        });

        // Reload users
        await loadUsers();
      } catch (error) {
        alert(`Failed to update role: ${error.message}`);
      }
    }

    // Load evals
    async function loadEvals() {
      const container = document.getElementById('evals-content');

      try {
        const data = await apiCall('/api/admin/evals/message-assessor');

        container.innerHTML = `
          <div style="margin-bottom: 24px;">
            <strong>Fixture Set:</strong> ${data.fixtureSet.id} (${data.fixtureSet.caseCount} cases)
          </div>

          <h3 class="subsection-title">Eval History</h3>
          <div class="data-table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Time</th>
                  <th>Requested By</th>
                  <th>Strategy</th>
                  <th>Model</th>
                  <th>Score</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                ${data.runs && data.runs.length > 0 ? data.runs.map(run => `
                  <tr>
                    <td><span class="timestamp">${formatTimestamp(run.createdAt)}</span></td>
                    <td>${run.requestedByName || 'Unknown'}</td>
                    <td>${run.strategy}</td>
                    <td>${run.modelLabel}</td>
                    <td>${run.overallScore !== null ? `<span class="metric-score">${run.overallScore.toFixed(2)}</span>` : 'N/A'}</td>
                    <td>
                      <span class="badge ${run.completedCases === run.totalCases ? 'completed' : 'running'}">
                        ${run.completedCases}/${run.totalCases} cases
                      </span>
                    </td>
                  </tr>
                `).join('') : '<tr><td colspan="6" class="empty-state">No eval runs yet</td></tr>'}
              </tbody>
            </table>
          </div>
        `;
      } catch (error) {
        container.innerHTML = `<div class="error-state">Failed to load evaluations: ${error.message}</div>`;
      }
    }

    // Run new eval
    document.getElementById('run-eval-btn')?.addEventListener('click', async () => {
      const btn = document.getElementById('run-eval-btn');
      btn.disabled = true;
      btn.textContent = 'Running...';

      try {
        await apiCall('/api/admin/evals/message-assessor/run', {
          method: 'POST',
          body: JSON.stringify({ strategy: 'heuristic_only' })
        });

        alert('Evaluation started successfully!');
        await loadEvals();
      } catch (error) {
        alert(`Failed to run evaluation: ${error.message}`);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Run New Eval';
      }
    });

    // Load maintenance
    async function loadMaintenance() {
      const container = document.getElementById('maintenance-content');

      try {
        const data = await apiCall('/api/admin/overview');

        container.innerHTML = `
          <h3 class="subsection-title">Retention Purge History</h3>
          <div class="data-table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Time</th>
                  <th>Status</th>
                  <th>Sessions Deleted</th>
                  <th>Messages Deleted</th>
                  <th>Duration</th>
                </tr>
              </thead>
              <tbody>
                ${data.maintenanceRuns && data.maintenanceRuns.length > 0 ? data.maintenanceRuns.map(run => `
                  <tr>
                    <td><span class="timestamp">${formatTimestamp(run.startedAt)}</span></td>
                    <td><span class="badge ${run.status}">${run.status}</span></td>
                    <td>${run.result?.sessionsDeleted || 0}</td>
                    <td>${run.result?.messagesDeleted || 0}</td>
                    <td>${run.result?.durationMs ? `${(run.result.durationMs / 1000).toFixed(1)}s` : 'N/A'}</td>
                  </tr>
                `).join('') : '<tr><td colspan="5" class="empty-state">No maintenance runs yet</td></tr>'}
              </tbody>
            </table>
          </div>
        `;
      } catch (error) {
        container.innerHTML = `<div class="error-state">Failed to load maintenance history: ${error.message}</div>`;
      }
    }

    // Run retention purge
    document.getElementById('run-retention-btn')?.addEventListener('click', async () => {
      if (!confirm('Are you sure you want to run a retention purge? This will delete expired sessions and messages.')) {
        return;
      }

      const btn = document.getElementById('run-retention-btn');
      btn.disabled = true;
      btn.textContent = 'Running...';

      try {
        await apiCall('/api/admin/maintenance/retention/run', {
          method: 'POST'
        });

        alert('Retention purge completed successfully!');
        await loadMaintenance();
      } catch (error) {
        alert(`Failed to run retention purge: ${error.message}`);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Run Retention Purge';
      }
    });

    // Logout
    document.getElementById('logout-btn')?.addEventListener('click', () => {
      localStorage.clear();
      window.location.href = '/';
    });

    // Utility functions
    function formatTimestamp(dateStr) {
      if (!dateStr) return 'N/A';
      const date = new Date(dateStr);
      return date.toLocaleString();
    }

    function formatAction(action) {
      if (!action) return 'Unknown';
      return action
        .split('.')
        .map(part => part.charAt(0).toUpperCase() + part.slice(1))
        .join(' > ');
    }

    function formatMetadata(metadata) {
      if (!metadata) return '';
      return Object.entries(metadata)
        .map(([key, value]) => `${key}: ${value}`)
        .join(', ');
    }
  </script>
</body>
</html>
